<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로고 시안 (링크·모니터링) | APEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/components.css" />
<style>
  .cwrap{max-width:1120px;margin:0 auto;padding:40px 24px 80px}
  h1.c{font-size:clamp(24px,3.4vw,34px);font-weight:800;margin:0 0 8px}
  .csub{color:var(--muted);margin:0 0 32px;font-size:15px;max-width:70ch;line-height:1.7}
  .concept{display:grid;grid-template-columns:1.15fr .85fr;border:1px solid var(--line);
    border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px;background:var(--panel)}
  .concept .show{display:grid;place-items:center;padding:40px;min-height:210px;
    background:linear-gradient(45deg,#eef2f8 25%,transparent 25%,transparent 75%,#eef2f8 75%) 0 0/22px 22px,var(--panel)}
  .concept .show svg{width:min(100%,300px);height:auto}
  .concept .meta{padding:28px 30px;border-left:1px solid var(--line);display:flex;flex-direction:column;gap:11px}
  .concept .tag{font-family:ui-monospace,Consolas,monospace;font-size:12px;font-weight:800;color:var(--brand-2)}
  .concept h3{font-size:21px;margin:0}
  .concept p{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.7}
  .mini{background:#0e1726;border-radius:12px;padding:14px 18px;display:inline-grid;place-items:center;margin-top:4px}
  .mini svg{width:190px;height:auto}
  .pick{margin-top:6px;font-size:13px;color:var(--muted)}
  .backl{display:inline-block;color:var(--brand);font-size:14px;margin-bottom:22px}
  .best{display:inline-block;font-size:11px;font-weight:800;color:#fff;background:var(--brand-2);border-radius:999px;padding:2px 9px;margin-left:8px;vertical-align:middle}
</style>
</head>
<body>
<div class="cwrap">
  <a class="backl" href="index.html">← 홈으로</a>
  <h1 class="c">로고 시안 — 링크 · 디바이스 연결 · 모니터링</h1>
  <p class="csub">베이스는 “모노라인 APEX(①)”. A·P·E·X 네 글자를 <b>링크(연결선)</b>로 이어
    디바이스 연결(linkage)과 모니터링 서비스 느낌을 준 4가지 버전입니다.
    마음에 드는 번호를 알려주세요. (왼쪽: 밝은 배경 큰 심볼 / 오른쪽: 어두운 배경 미리보기)</p>
  <div id="grid"></div>
</div>

<script>
(function () {
  // A·P·E·X 모노라인 글자 (cap top y=14, base y=58)
  var LETTERS = [
    "M8 58 26 14 44 58", "M15.5 43 H36.5",
    "M56 14 V58", "M56 14 H72 C82 14 82 35 72 35 H56",
    "M92 14 V58", "M92 14 H120", "M92 35 H114", "M92 58 H120",
    "M132 14 166 58", "M166 14 132 58"
  ];
  function letters() { return LETTERS.map(function (d) { return '<path d="' + d + '"/>'; }).join(""); }
  function stops(bright) {
    return bright
      ? '<stop offset="0" stop-color="#4d8bff"/><stop offset=".55" stop-color="#22d3bf"/><stop offset="1" stop-color="#7fe6ff"/>'
      : '<stop offset="0" stop-color="#1b56e0"/><stop offset=".58" stop-color="#06b6a4"/><stop offset="1" stop-color="#4dd9ff"/>';
  }
  function buildSVG(id, bright, extraFn) {
    var gid = id + (bright ? "d" : "");
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 90">' +
      '<defs><linearGradient id="' + gid + '" gradientUnits="userSpaceOnUse" x1="8" y1="14" x2="188" y2="72">' + stops(bright) + '</linearGradient></defs>' +
      extraFn(gid, "back") +
      '<g fill="none" stroke="url(#' + gid + ')" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">' + letters() + '</g>' +
      extraFn(gid, "front") +
      '</svg>';
  }

  // 링크 그래픽 (concept별). layer: back(글자 뒤) / front(글자 앞)
  var EXTRAS = {
    // ① 회로 베이스라인
    circuit: function (gid, layer) {
      if (layer !== "front") return "";
      var nodes = [26, 64, 106, 149].map(function (x) { return '<circle cx="' + x + '" cy="74" r="3"/>'; }).join("");
      return '<path d="M8 74 H166" stroke="url(#' + gid + ')" stroke-width="2.4" stroke-linecap="round" opacity=".5"/>' +
        '<g fill="url(#' + gid + ')">' + nodes + '</g>';
    },
    // ② 링크 토폴로지 (위쪽 네트워크 링크 + 노드 + 라이브 링)
    topology: function (gid, layer) {
      if (layer !== "front") return "";
      var pts = [[26, 8], [66, 5], [106, 5], [149, 8]];
      var nodes = pts.map(function (p) { return '<circle cx="' + p[0] + '" cy="' + p[1] + '" r="3.4"/>'; }).join("");
      var stubs = "";
      pts.forEach(function (p) { stubs += '<path d="M' + p[0] + ' ' + p[1] + ' V14" stroke="url(#' + gid + ')" stroke-width="1.6" opacity=".45"/>'; });
      return '<path d="M26 8 Q88 -3 149 8" fill="none" stroke="url(#' + gid + ')" stroke-width="2.3" stroke-dasharray="1.5 6" stroke-linecap="round" opacity=".85"/>' +
        stubs + '<g fill="url(#' + gid + ')">' + nodes + '</g>' +
        '<circle cx="106" cy="5" r="7" fill="none" stroke="url(#' + gid + ')" stroke-width="1.6" opacity=".5"/>';
    },
    // ③ 라이브 웨이브폼 (아래 신호 라인)
    wave: function (gid, layer) {
      if (layer !== "front") return "";
      return '<path d="M6 74 H42 L50 64 L58 82 L66 74 H108 L116 62 L124 84 L132 74 H190" fill="none" ' +
        'stroke="url(#' + gid + ')" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>' +
        '<circle cx="116" cy="62" r="4.2" fill="url(#' + gid + ')"/>';
    },
    // ④ 링크드 디바이스 (각 글자 = 칩, 버스로 연결)
    devices: function (gid, layer) {
      if (layer !== "front") return "";
      var xs = [26, 64, 106, 149];
      var bus = '<path d="M20 76 H155" stroke="url(#' + gid + ')" stroke-width="2.2" opacity=".5" stroke-linecap="round"/>';
      var chips = xs.map(function (cx) {
        return '<rect x="' + (cx - 9) + '" y="70" width="18" height="12" rx="3.4" fill="url(#' + gid + ')"/>' +
          '<circle cx="' + cx + '" cy="76" r="2.2" fill="#fff"/>' +
          '<path d="M' + cx + ' 70 V' + 60 + '" stroke="url(#' + gid + ')" stroke-width="1.6" opacity=".45"/>';
      }).join("");
      return bus + chips;
    }
  };

  var CONCEPTS = [
    { id: "c1", key: "circuit", n: "01", name: "모노라인 APEX", best: true,
      desc: "베이스 시안. 네 글자를 균일한 선으로 그리고 아래 회로 라인+노드로 연결. 가장 정돈되고 범용적입니다." },
    { id: "c2", key: "topology", n: "02", name: "링크 토폴로지", best: false,
      desc: "글자 위를 네트워크 링크선과 노드로 연결하고, 가운데에 ‘라이브’ 링을 얹었습니다. 모니터링 대시보드의 디바이스 맵 느낌." },
    { id: "c3", key: "wave", n: "03", name: "라이브 웨이브폼", best: false,
      desc: "글자 아래로 실시간 신호(파형) 라인이 흐르고 밝은 데이터 포인트가 찍힙니다. 실시간 모니터링 서비스 느낌이 가장 강합니다." },
    { id: "c4", key: "devices", n: "04", name: "링크드 디바이스", best: false,
      desc: "각 글자를 작은 디바이스 칩으로 만들고 하나의 버스(bus)로 연결. 디바이스 연결(linkage) 의미가 가장 직접적입니다." }
  ];

  var grid = document.getElementById("grid");
  CONCEPTS.forEach(function (c) {
    var extra = EXTRAS[c.key];
    var el = document.createElement("div");
    el.className = "concept";
    el.innerHTML =
      '<div class="show">' + buildSVG(c.id, false, extra) + "</div>" +
      '<div class="meta">' +
      '<span class="tag">CONCEPT ' + c.n + "</span>" +
      "<h3>" + c.name + (c.best ? '<span class="best">현재 베이스</span>' : "") + "</h3>" +
      "<p>" + c.desc + "</p>" +
      '<span class="mini">' + buildSVG(c.id, true, extra) + "</span>" +
      '<p class="pick">→ “' + c.n.replace(/^0/, "") + '번”이라고 답해주세요.</p>' +
      "</div>";
    grid.appendChild(el);
  });
})();
</script>
</body>
</html>
