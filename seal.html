<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>법인 인감 시안 | 주식회사 에이펙스</title>
<meta name="description" content="주식회사 에이펙스 법인 인감(도장) 디자인 시안 — 전각 스타일 동그라미 3 · 네모 3 (SVG·PNG)." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/components.css" />
<style>
  .seal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;padding:36px 0}
  .seal-card{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);box-shadow:var(--shadow);display:flex;flex-direction:column}
  .seal-show{display:grid;place-items:center;min-height:220px;padding:24px;background:var(--bg-alt)}
  .seal-show svg{width:184px;height:184px}
  .seal-meta{padding:15px 18px;border-top:1px solid var(--line);margin-top:auto}
  .seal-meta h3{font-size:15px;margin:0 0 4px}
  .seal-meta .kind{font-size:11px;font-weight:800;color:var(--brand-2);font-family:ui-monospace,Consolas,monospace}
  .seal-meta p{font-size:12px;color:var(--muted);margin:4px 0 12px;line-height:1.6}
  .seal-dl{display:flex;gap:8px}
  .warn{background:#fff4f4;border:1px solid #f2c4c4;color:#9a2b2b;border-radius:var(--radius);padding:18px 22px;margin:8px 0 4px;font-size:14px;line-height:1.75}
  .warn b{color:#7a1f1f}
</style>
</head>
<body data-page="seal">
<main>
  <section class="page-hero">
    <div class="wrap">
      <p class="eyebrow">Corporate Seal</p>
      <h1 class="title">법인 인감 시안</h1>
      <p class="lead">전각(篆刻) 느낌으로 글자를 꽉 채운 인감 시안 6종 — 동그라미 3 · 네모 3. 마음에 드는 디자인을 골라 도장집에서 실물로 제작하세요.</p>
    </div>
  </section>

  <section class="section" style="padding-top:36px">
    <div class="wrap">
      <div class="warn">
        ⚠️ <b>안내</b> — 아래는 <b>디자인 시안(이미지)</b>입니다. 실제 법인 인감은 도장집에서 <b>전서체로 실물 각인 후 등기소에 인감신고</b>를 해야 효력이 생깁니다.
        (전서체 전용 폰트가 없어 웹에서는 획을 꽉 채운 근사치로 표현했습니다.)
        보안을 위해 <b>등록된 실제 인감 이미지는 웹·문서에 공개하지 마세요.</b>
      </div>
      <div class="seal-grid" id="sealGrid"></div>
    </div>
  </section>
</main>

<script src="js/layout.js"></script>
<script src="js/notices.js"></script>
<script src="js/site.js"></script>
<script src="js/admin.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  var R = "#c1121f";
  var FSANS = "'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif";
  var FSERIF = "'Batang','Nanum Myeongjo','AppleMyungjo',serif";

  function wrap(inner) {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">' + inner + '</svg>';
  }
  // 한 글자를 칸(폭 w)에 꽉 채워 늘려 배치 (전각 느낌)
  function ch(cx, cy, w, c, fs, font) {
    return '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="central" ' +
      'textLength="' + w + '" lengthAdjust="spacingAndGlyphs" font-family="' + (font || FSANS) + '" ' +
      'font-weight="900" font-size="' + fs + '" fill="' + R + '" stroke="' + R + '" stroke-width="' + (fs * 0.11).toFixed(2) + '" paint-order="stroke" stroke-linejoin="round">' + c + '</text>';
  }
  // 격자 배치: chars(문자열), cols, rows, 안쪽 영역(x0,y0,x1,y1)
  function grid(chars, cols, rows, x0, y0, x1, y1, fill, font) {
    var cw = (x1 - x0) / cols, chh = (y1 - y0) / rows;
    var fs = Math.min(cw, chh) * (fill || 1.06);
    var out = "";
    for (var i = 0; i < chars.length; i++) {
      var r = Math.floor(i / cols), c = i % cols;
      out += ch(x0 + cw * (c + 0.5), y0 + chh * (r + 0.5), cw * 1.0, chars[i], fs, font);
    }
    return out;
  }
  function sq() { return '<rect x="8" y="8" width="184" height="184" rx="14" fill="none" stroke="' + R + '" stroke-width="16"/>' +
    '<rect x="24" y="24" width="152" height="152" rx="6" fill="none" stroke="' + R + '" stroke-width="3.5"/>'; }
  function ci() { return '<circle cx="100" cy="100" r="90" fill="none" stroke="' + R + '" stroke-width="16"/>' +
    '<circle cx="100" cy="100" r="75" fill="none" stroke="' + R + '" stroke-width="3.5"/>'; }

  var SEALS = [
    // ── 동그라미 3 ──
    { key: "ci-2x2", kind: "동그라미", name: "에이펙스 (원형 2×2)", desc: "원 안에 네 글자를 꽉 채운 원형 전각.",
      svg: wrap(ci() + grid("에이펙스", 2, 2, 38, 38, 162, 162, 1.08)) },
    { key: "ci-3x3", kind: "동그라미", name: "주식회사에이펙스印 (원형 3×3)", desc: "원형 안에 9칸을 채운 전각형.",
      svg: wrap(ci() + grid("주식회사에이펙스印", 3, 3, 38, 38, 162, 162, 1.02)) },
    { key: "ci-daepyo", kind: "동그라미", name: "代表理事印 (원형 한자)", desc: "‘대표이사인’ 한자를 원 안에 꽉 채운 전각.",
      svg: wrap(ci() + grid("代表理事印", 3, 2, 40, 54, 160, 146, 1.04, FSERIF)) },
    // ── 네모 3 ──
    { key: "sq-2x2", kind: "네모", name: "에이펙스 (2×2)", desc: "‘에이펙스’ 네 글자를 큼직하게 꽉 채운 전각형.",
      svg: wrap(sq() + grid("에이펙스", 2, 2, 28, 28, 172, 172, 1.1)) },
    { key: "sq-3x3", kind: "네모", name: "주식회사에이펙스印 (3×3)", desc: "9칸을 빈틈없이 채운 정통 전각 스타일.",
      svg: wrap(sq() + grid("주식회사에이펙스印", 3, 3, 27, 27, 173, 173, 1.1)) },
    { key: "sq-hanja", kind: "네모", name: "株式會社 에이펙스 印 (한자)", desc: "한자+한글 3×3 혼합 전각.",
      svg: wrap(sq() + grid("株式會社에이펙스印", 3, 3, 27, 27, 173, 173, 1.06, FSERIF)) }
  ];

  function trigger(url, name) { var a = document.createElement("a"); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); }
  function dlSVG(s) {
    var blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + s.svg], { type: "image/svg+xml;charset=utf-8" });
    var url = URL.createObjectURL(blob); trigger(url, "apex-seal-" + s.key + ".svg"); setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
  }
  function dlPNG(s) {
    var img = new Image();
    img.onload = function () {
      var c = document.createElement("canvas"); c.width = 800; c.height = 800;
      c.getContext("2d").drawImage(img, 0, 0, 800, 800);
      c.toBlob(function (b) { var url = URL.createObjectURL(b); trigger(url, "apex-seal-" + s.key + ".png"); setTimeout(function () { URL.revokeObjectURL(url); }, 1500); }, "image/png");
    };
    img.onerror = function () { alert("PNG 변환 실패. SVG로 받아주세요."); };
    img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(s.svg);
  }

  var wrapEl = document.getElementById("sealGrid");
  SEALS.forEach(function (s) {
    var card = document.createElement("div"); card.className = "seal-card";
    card.innerHTML = '<div class="seal-show">' + s.svg + '</div><div class="seal-meta">' +
      '<span class="kind">' + s.kind + '</span><h3>' + s.name + '</h3><p>' + s.desc + '</p>' +
      '<div class="seal-dl"><button class="btn-sm primary">SVG</button><button class="btn-sm">PNG</button></div></div>';
    var b = card.querySelectorAll("button");
    b[0].addEventListener("click", function () { dlSVG(s); });
    b[1].addEventListener("click", function () { dlPNG(s); });
    wrapEl.appendChild(card);
  });
})();
</script>
</body>
</html>
