<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>브랜드 · 로고 | 주식회사 에이펙스</title>
<meta name="description" content="주식회사 에이펙스(APEX) 로고·브랜드 자산 다운로드 — 모노라인 APEX 심볼, 가로형, 세로형, 단색, 화이트 버전 (SVG·PNG)." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/components.css" />
<style>
  .brand-hero{padding:72px 0 44px;border-bottom:1px solid var(--line);
    background:linear-gradient(118deg,#f7fbff 0%,#ffffff 54%,#effbf8 100%)}
  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;margin-bottom:20px}
  .back-link:hover{color:var(--brand)}
  .logo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:22px;padding:48px 0}
  .logo-card{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);
    box-shadow:var(--shadow);display:flex;flex-direction:column}
  .logo-preview{display:grid;place-items:center;min-height:190px;padding:30px}
  .logo-preview.light{background:
    linear-gradient(45deg,#eef2f8 25%,transparent 25%,transparent 75%,#eef2f8 75%) 0 0/22px 22px,var(--panel)}
  .logo-preview.dark{background:#0e1726}
  .logo-preview svg{max-width:78%;max-height:120px;height:auto}
  .logo-meta{padding:18px 20px;border-top:1px solid var(--line);margin-top:auto}
  .logo-meta h3{font-size:16px;margin:0 0 4px}
  .logo-meta p{font-size:13px;color:var(--muted);margin:0 0 14px}
  .logo-dl{display:flex;gap:8px}
  .usage{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:8px}
  .usage h3{font-size:16px;margin:0 0 10px}
  .usage ul{margin:0;padding-left:2px;display:flex;flex-direction:column;gap:7px}
  .usage li{position:relative;padding-left:18px;font-size:14px;color:var(--ink-soft)}
  .usage li::before{content:"▸";position:absolute;left:0;color:var(--brand-2)}
</style>
</head>
<body data-page="brand">

<section class="page-hero">
  <div class="wrap">
    <p class="eyebrow">Brand Assets</p>
    <h1 class="title">브랜드 · 로고</h1>
    <p class="lead">A·P·E·X 네 글자를 하나의 모노라인으로 그리고 회로 라인으로 연결한 로고입니다.
      용도에 맞게 내려받으세요. 벡터(SVG)는 인쇄·확대에, PNG는 문서·웹에 적합합니다.</p>
  </div>
</section>

<main class="wrap">
  <div class="logo-grid" id="logoGrid"></div>

  <div class="usage">
    <h3>사용 가이드</h3>
    <ul>
      <li>로고의 비율을 임의로 변형하거나 색을 바꾸지 마세요.</li>
      <li>밝은 배경에는 컬러/단색, 어두운 배경에는 화이트 버전을 사용하세요.</li>
      <li>로고 주변에는 심볼 높이의 약 1/2 이상 여백을 확보하세요.</li>
      <li>인쇄·간판 등 고해상도가 필요하면 SVG(벡터)를 사용하세요.</li>
    </ul>
  </div>
</main>

<script src="js/layout.js"></script>
<script src="js/notices.js"></script>
<script src="js/site.js"></script>
<script src="js/admin.js"></script>
<script src="js/main.js"></script>
<script>
(function () {
  // ---- 로고 SVG 빌더 (모노라인 APEX) ----
  function gdef(id, x1, y1, x2, y2) {
    return '<linearGradient id="' + id + '" gradientUnits="userSpaceOnUse" x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '">' +
      '<stop offset="0" stop-color="#1b56e0"/><stop offset=".58" stop-color="#06b6a4"/><stop offset="1" stop-color="#4dd9ff"/></linearGradient>';
  }
  // A·P·E·X 모노라인 글자 (x 8..166, 글자 y14..58, 베이스라인 y74)
  var LETTERS = ["M8 58 26 14 44 58", "M15.5 43 H36.5", "M56 14 V58", "M56 14 H72 C82 14 82 35 72 35 H56",
    "M92 14 V58", "M92 14 H120", "M92 35 H114", "M92 58 H120", "M132 14 166 58", "M166 14 132 58"];
  function mono(paint, tx, ty, sc) {
    var L = LETTERS.map(function (d) { return '<path d="' + d + '"/>'; }).join("");
    var nodes = [26, 64, 106, 149].map(function (x) { return '<circle cx="' + x + '" cy="74" r="3"/>'; }).join("");
    return '<g transform="translate(' + tx + ',' + ty + ') scale(' + sc + ')">' +
      '<g fill="none" stroke="' + paint + '" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">' + L + '</g>' +
      '<path d="M8 74 H166" stroke="' + paint + '" stroke-width="2.4" stroke-linecap="round" opacity=".5"/>' +
      '<g fill="' + paint + '">' + nodes + '</g></g>';
  }
  // 정사각 심볼: 라운드 칩 + 모노라인 A
  function symbolTile(tile, glyph) {
    return '<rect x="3" y="3" width="42" height="42" rx="12" fill="' + tile + '"/>' +
      '<g fill="none" stroke="' + glyph + '" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M13.5 35 24 12 34.5 35"/><path d="M18.6 27.6 H29.4"/></g><circle cx="24" cy="12" r="2.3" fill="' + glyph + '"/>';
  }
  var SUBFONT = "Pretendard, Malgun Gothic, Arial, sans-serif";
  function sub(x, y, fill, anchor) {
    return '<text x="' + x + '" y="' + y + '"' + (anchor ? ' text-anchor="' + anchor + '"' : '') +
      ' font-family="' + SUBFONT + '" font-weight="650" font-size="12" letter-spacing="1" fill="' + fill + '">주식회사 에이펙스</text>';
  }
  function svg(vb, w, h, inner) {
    return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + vb + '" width="' + w + '" height="' + h + '">' + inner + '</svg>';
  }

  var VARIANTS = [
    { key: "symbol", name: "심볼 마크", desc: "모노라인 A 칩. 파비콘·프로필·앱 아이콘용.", dark: false,
      svg: svg("48 48", 48, 48, '<defs>' + gdef("gs", 6, 6, 42, 42) + '</defs>' + symbolTile("url(#gs)", "#fff")) },
    { key: "horizontal", name: "가로형 (기본)", desc: "모노라인 APEX + 회로 라인. 공식 기본형.", dark: false,
      svg: svg("174 82", 174, 82, '<defs>' + gdef("gh", 8, 14, 166, 72) + '</defs>' + mono("url(#gh)", 0, 0, 1)) },
    { key: "vertical", name: "세로형", desc: "APEX 로고 아래 상호를 넣은 버전.", dark: false,
      svg: svg("180 116", 180, 116, '<defs>' + gdef("gv", 16, 15, 158, 68) + '</defs>' + mono("url(#gv)", 9, 2, 0.9) + sub(90, 105, "#67768d", "middle")) },
    { key: "mono-black", name: "단색 (블랙)", desc: "팩스·도장·단색 인쇄·계약서용.", dark: false,
      svg: svg("174 82", 174, 82, mono("#0e1726", 0, 0, 1)) },
    { key: "white", name: "화이트 (역상)", desc: "어두운 배경·사진 위에 사용.", dark: true,
      svg: svg("174 82", 174, 82, mono("#ffffff", 0, 0, 1)) }
  ];

  // ---- 다운로드 ----
  function trigger(url, filename) {
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
  }
  function dlSVG(v) {
    var blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + v.svg], { type: "image/svg+xml;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    trigger(url, "apex-logo-" + v.key + ".svg");
    setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
  }
  function dlPNG(v) {
    var m = v.svg.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
    var vw = +m[1], vh = +m[2];
    var outW = v.key === "symbol" ? 512 : 1400;
    var img = new Image();
    img.onload = function () {
      var c = document.createElement("canvas");
      c.width = outW; c.height = Math.round(vh * (outW / vw));
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(function (b) {
        var url = URL.createObjectURL(b);
        trigger(url, "apex-logo-" + v.key + ".png");
        setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
      }, "image/png");
    };
    img.onerror = function () { alert("PNG 변환에 실패했습니다. SVG로 받아주세요."); };
    img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(v.svg);
  }

  // ---- 렌더 ----
  var grid = document.getElementById("logoGrid");
  VARIANTS.forEach(function (v) {
    var card = document.createElement("div");
    card.className = "logo-card";
    card.innerHTML =
      '<div class="logo-preview ' + (v.dark ? "dark" : "light") + '">' + v.svg + "</div>" +
      '<div class="logo-meta"><h3>' + v.name + "</h3><p>" + v.desc + "</p>" +
      '<div class="logo-dl"><button class="btn-sm primary">SVG</button><button class="btn-sm">PNG</button></div></div>';
    var btns = card.querySelectorAll("button");
    btns[0].addEventListener("click", function () { dlSVG(v); });
    btns[1].addEventListener("click", function () { dlPNG(v); });
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
